<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestion des produits</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>📦 Gestion des produits</h1>
        <div>
            <a href="/shop/products" class="btn btn-outline-primary">🛍️ Voir la boutique</a>
            <a th:href="@{/products/new}" class="btn btn-success">➕ Nouveau produit</a>
        </div>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <table class="table table-striped table-hover">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Nom</th>
                <th>Description</th>
                <th>Prix</th>
                <th>Stock</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="product : ${products}">
                <td th:text="${product.id}">1</td>
                <td th:text="${product.name}">Nom</td>
                <td th:text="${product.description}">Description</td>
                <td th:text="${product.price} + ' €'">10 €</td>
                <td th:text="${product.stock}">5</td>
                <td>
                    <!-- ✅ Voir détail -->
                    <a th:href="@{/products/details/{id}(id=${product.id})}" class="btn btn-sm btn-info">👁️ Voir</a>
                    
                    <!-- ✅ MODIFIER - URL corrigée (déjà bonne) -->
                    <a th:href="@{/products/{id}/edit(id=${product.id})}" class="btn btn-sm btn-warning">✏️ Modifier</a>
                    
                    <!-- ✅ Supprimer -->
                    <form th:action="@{/products/{id}/delete(id=${product.id})}" method="post" style="display: inline;" onsubmit="return confirm('Supprimer ce produit ?')">
                        <button type="submit" class="btn btn-sm btn-danger">🗑️ Supprimer</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
