<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulaire produit</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- Navigation -->
<div class="container mt-3">
    <div class="d-flex gap-2 justify-content-end">
        <a th:href="@{/cart}" class="btn btn-outline-primary">🛒 Panier</a>
        <a th:href="@{/orders}" class="btn btn-outline-secondary">📦 Mes commandes</a>
        <a th:href="@{/products}" class="btn btn-outline-danger">⚙️ Admin</a>
    </div>
</div>

<!-- Formulaire -->
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h3 class="text-center" th:text="${product.id != null} ? '✏️ Modifier le produit' : '➕ Nouveau produit'"></h3>
                </div>
                <div class="card-body">
                    <!-- ✅ FORMULAIRE CORRIGÉ -->
                    <form th:action="${product.id != null} ? @{/products/{id}(id=${product.id})} : @{/products}"
                          th:object="${product}" method="post">
                        
                        <!-- Champ caché pour l'ID (important pour la modification) -->
                        <input type="hidden" th:field="*{id}" />
                        
                        <div class="mb-3">
                            <label class="form-label">🏷️ Nom :</label>
                            <input type="text" class="form-control" th:field="*{name}" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">📝 Description :</label>
                            <textarea class="form-control" th:field="*{description}" rows="3"></textarea>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">💰 Prix :</label>
                                <input type="number" step="0.01" class="form-control" th:field="*{price}" required>
                            </div>
                            
                            <div class="col-md-6 mb-3">
                                <label class="form-label">📦 Stock :</label>
                                <input type="number" class="form-control" th:field="*{stock}" required>
                            </div>
                        </div>
                        
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-success">💾 Enregistrer</button>
                            <a th:href="@{/products}" class="btn btn-secondary">❌ Annuler</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
