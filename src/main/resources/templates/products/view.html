<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Détail produit</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-info text-white">
                    <h3 class="text-center">🔍 Détail du produit</h3>
                </div>
                <div class="card-body">
                    <table class="table table-borderless">
                        <tr>
                            <th width="30%">ID :</th>
                            <td th:text="${product.id}">1</td>
                        </tr>
                        <tr>
                            <th>Nom :</th>
                            <td th:text="${product.name}">Nom</td>
                        </tr>
                        <tr>
                            <th>Description :</th>
                            <td th:text="${product.description}">Description</td>
                        </tr>
                        <tr>
                            <th>Prix :</th>
                            <td th:text="${product.price} + ' €'">10 €</td>
                        </tr>
                        <tr>
                            <th>Stock :</th>
                            <td>
                                <span th:class="${product.stock < 5} ? 'text-danger fw-bold' : 'text-success'"
                                      th:text="${product.stock}"></span>
                            </td>
                        </tr>
                    </table>
                    
                    <div class="d-flex gap-2 mt-3">
                        <a th:href="@{/products/{id}/edit(id=${product.id})}" class="btn btn-warning">✏️ Modifier</a>
                        <a th:href="@{/products}" class="btn btn-secondary">← Retour</a>
                        <form th:action="@{/add-to-cart/{id}(id=${product.id})}" method="post" class="d-inline">
                            <input type="hidden" name="quantity" value="1">
                            <button type="submit" class="btn btn-success">🛒 Acheter</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
