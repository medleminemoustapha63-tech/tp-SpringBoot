<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${isEdit} ? 'Modifier article' : 'Nouvel article'">Formulaire article</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header" th:classappend="${isEdit} ? 'bg-warning' : 'bg-success'">
                        <h1 class="h4 mb-0 text-white">
                            <i th:if="${isEdit}" class="fas fa-edit"></i>
                            <i th:unless="${isEdit}" class="fas fa-plus"></i>
                            <span th:text="${isEdit} ? 'Modifier l\'article' : 'Créer un nouvel article'"></span>
                        </h1>
                    </div>
                    <div class="card-body">
                        <form th:action="${isEdit} ? @{/update-article/{id}(id=${article.id})} : @{/save-article}" 
                              th:method="post" 
                              th:object="${article}">
                            
                            <div class="mb-3">
                                <label class="form-label fw-bold">
                                    <i class="fas fa-tag"></i> Titre :
                                </label>
                                <input type="text" class="form-control" th:field="*{title}" required 
                                       placeholder="Entrez le titre de l'article"/>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label fw-bold">
                                    <i class="fas fa-align-left"></i> Contenu :
                                </label>
                                <textarea class="form-control" th:field="*{content}" rows="10" 
                                          required placeholder="Entrez le contenu de l'article..."></textarea>
                                <small class="text-muted">Vous pouvez utiliser du texte formaté.</small>
                            </div>
                            
                            <div class="d-flex gap-2">
                                <button type="submit" class="btn" th:classappend="${isEdit} ? 'btn-warning' : 'btn-success'">
                                    <i th:if="${isEdit}" class="fas fa-save"></i>
                                    <i th:unless="${isEdit}" class="fas fa-check"></i>
                                    <span th:text="${isEdit} ? 'Mettre à jour' : 'Créer'"></span>
                                </button>
                                <a href="/list" class="btn btn-secondary">
                                    <i class="fas fa-times"></i> Annuler
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
