<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validation commande</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="display-5 fw-bold text-primary">
                <i class="fas fa-clipboard-list me-2"></i>Validation commande
            </h1>
            <a href="/cart" class="btn btn-outline-secondary">
                <i class="fas fa-arrow-left me-2"></i>Retour au panier
            </a>
        </div>
        
        <div class="row">
            <div class="col-md-7">
                <div class="card shadow-sm mb-4">
                    <div class="card-header bg-white">
                        <h5 class="mb-0"><i class="fas fa-user me-2"></i>Informations de livraison</h5>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/checkout}" method="post">
                            <div class="mb-3">
                                <label class="form-label">Nom complet</label>
                                <input type="text" name="fullName" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Adresse</label>
                                <textarea name="address" class="form-control" rows="3" required></textarea>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Téléphone</label>
                                <input type="tel" name="phone" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Mode de paiement</label>
                                <select name="paymentMethod" class="form-select" required>
                                    <option value="">Choisir...</option>
                                    <option value="CARTE_BANCAIRE">💳 Carte bancaire</option>
                                    <option value="PAYPAL">💰 PayPal</option>
                                    <option value="VIREMENT">🏦 Virement bancaire</option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-success w-100">
                                <i class="fas fa-check-circle me-2"></i>Confirmer la commande
                            </button>
                        </form>
                    </div>
                </div>
            </div>
            
            <div class="col-md-5">
                <div class="card shadow-sm">
                    <div class="card-header bg-white">
                        <h5 class="mb-0"><i class="fas fa-shopping-cart me-2"></i>Récapitulatif</h5>
                    </div>
                    <div class="card-body">
                        <div th:each="item : ${cartItems}" class="d-flex justify-content-between mb-2">
                            <span><span th:text="${item.product.name}"></span> x<span th:text="${item.quantity}"></span></span>
                            <span>€<span th:text="${#numbers.formatDecimal(item.product.price * item.quantity, 1, 2)}"></span></span>
                        </div>
                        <hr>
                        <div class="d-flex justify-content-between">
                            <strong>Total TTC :</strong>
                            <strong class="h5 text-success">€<span th:text="${#numbers.formatDecimal(total, 1, 2)}"></span></strong>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
