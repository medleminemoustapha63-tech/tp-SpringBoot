<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Boutique</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <div class="d-flex justify-content-between mb-4">
        <h1>🛍️ Ma Boutique</h1>
        <div>
            <a href="/cart" class="btn btn-outline-primary">🛒 Panier</a>
            <a href="/mes-commandes" class="btn btn-outline-secondary">📦 Mes commandes</a>
            <a href="/products" class="btn btn-outline-success">📋 Admin</a>
        </div>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="row">
        <div th:each="product : ${products}" class="col-md-4 mb-4">
            <div class="card h-100">
                <div class="card-body">
                    <h5 class="card-title" th:text="${product.name}"></h5>
                    <p class="card-text" th:text="${product.description}"></p>
                    <h4 class="text-primary" th:text="${product.price} + ' €'"></h4>
                    <small>Stock: <span th:text="${product.stock}"></span></small>
                    <hr>
                    <form th:action="@{/add-to-cart/{id}(id=${product.id})}" method="post">
                        <div class="input-group">
                            <input type="number" name="quantity" value="1" min="1" th:max="${product.stock}" class="form-control">
                            <button type="submit" class="btn btn-success">🛒 Acheter</button>
                        </div>
                    </form>
                    <a th:href="@{/products/details/{id}(id=${product.id})}" class="btn btn-sm btn-info mt-2 w-100">🔍 Voir détails</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
