<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Commandes</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .order-card {
            transition: transform 0.2s;
        }
        .order-card:hover {
            transform: translateY(-2px);
        }
        .status-badge {
            font-size: 0.75rem;
            padding: 5px 10px;
            border-radius: 20px;
        }
        .status-CONFIRMED { background-color: #d4edda; color: #155724; }
        .status-PENDING { background-color: #fff3cd; color: #856404; }
        .status-CANCELLED { background-color: #f8d7da; color: #721c24; }
        .status-DELIVERED { background-color: #d1ecf1; color: #0c5460; }
        .status-PROCESSING { background-color: #cce5ff; color: #004085; }
        .table-hover tbody tr:hover {
            background-color: rgba(0,123,255,0.05);
        }
        .btn-outline-custom:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="container py-4">
        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom">
            <div>
                <h1 class="display-5 fw-bold text-primary">
                    <i class="fas fa-box me-2"></i>Mes Commandes
                </h1>
                <p class="text-muted">Suivez l'état de vos achats</p>
            </div>
            <a href="/shop/products" class="btn btn-outline-primary btn-lg">
                <i class="fas fa-shopping-cart me-2"></i>Continuer les achats
            </a>
        </div>
        
        <!-- Messages Alert -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="fas fa-check-circle me-2"></i> <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="fas fa-exclamation-circle me-2"></i> <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        
        <!-- Liste des commandes -->
        <div th:if="${orders != null and !orders.empty}">
            <div class="row">
                <div class="col-12 mb-3">
                    <div class="card bg-light">
                        <div class="card-body">
                            <i class="fas fa-chart-line me-2 text-primary"></i>
                            Total commandes : <strong th:text="${orders.size()}"></strong>
                        </div>
                    </div>
                </div>
            </div>
            
            <div th:each="order : ${orders}" class="card order-card shadow-sm mb-4">
                <div class="card-header bg-white">
                    <div class="row align-items-center">
                        <div class="col-md-4">
                            <h5 class="mb-0">
                                <i class="fas fa-hashtag text-secondary"></i>
                                Commande #<span th:text="${order.id}"></span>
                            </h5>
                        </div>
                        <div class="col-md-3">
                            <small class="text-muted">
                                <i class="far fa-calendar-alt me-1"></i>
                                <span th:text="${#temporals.format(order.orderDate, 'dd/MM/yyyy HH:mm')}"></span>
                            </small>
                        </div>
                        <div class="col-md-3">
                            <span class="status-badge" th:classappend="'status-' + ${order.status}">
                                <i class="fas fa-info-circle me-1"></i>
                                <span th:text="${order.status}"></span>
                            </span>
                        </div>
                        <div class="col-md-2 text-md-end">
                            <a th:href="@{/mes-commandes/{id}(id=${order.id})}" class="btn btn-sm btn-primary">
                                <i class="fas fa-eye me-1"></i>Détails
                            </a>
                        </div>
                    </div>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-8">
                            <div class="table-responsive">
                                <table class="table table-sm table-hover mb-0">
                                    <thead class="table-light">
                                        <tr>
                                            <th>Produit</th>
                                            <th>Quantité</th>
                                            <th>Prix unitaire</th>
                                            <th>Total</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="item : ${order.orderItems}" th:if="${item.product != null}">
                                            <td>
                                                <i class="fas fa-tag text-secondary me-1"></i>
                                                <span th:text="${item.product.name}"></span>
                                            </td>
                                            <td>
                                                <span class="badge bg-secondary" th:text="${item.quantity}"></span>
                                            </td>
                                            <td th:text="'€' + ${#numbers.formatDecimal(item.price, 1, 2)}"></td>
                                            <td class="fw-bold" th:text="'€' + ${#numbers.formatDecimal(item.price * item.quantity, 1, 2)}"></td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="card bg-light">
                                <div class="card-body">
                                    <div class="d-flex justify-content-between mb-2">
                                        <span>Total articles:</span>
                                        <strong>
                                            <span th:text="${#aggregates.sum(order.orderItems.![quantity])}"></span>
                                        </strong>
                                    </div>
                                    <div class="d-flex justify-content-between mb-2">
                                        <span>Total TTC:</span>
                                        <strong class="text-success h5 mb-0">
                                            €<span th:text="${#numbers.formatDecimal(order.totalAmount, 1, 2)}"></span>
                                        </strong>
                                    </div>
                                    <hr>
                                    <form th:action="@{/mes-commandes/cancel/{id}(id=${order.id})}" method="post" class="d-grid">
                                        <button type="submit" class="btn btn-outline-danger btn-sm" 
                                                th:if="${order.status == 'CONFIRMED' or order.status == 'PENDING'}"
                                                onclick="return confirm('Êtes-vous sûr de vouloir annuler cette commande ?')">
                                            <i class="fas fa-times-circle me-1"></i>Annuler la commande
                                        </button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Empty state -->
        <div th:if="${orders == null or orders.empty}" class="text-center py-5">
            <div class="card shadow-sm">
                <div class="card-body py-5">
                    <i class="fas fa-inbox fa-4x text-muted mb-3"></i>
                    <h3 class="text-muted">Vous n'avez pas encore de commandes</h3>
                    <p class="text-muted">Découvrez nos produits et faites votre première commande !</p>
                    <a href="/shop/products" class="btn btn-success btn-lg mt-3">
                        <i class="fas fa-store me-2"></i>Découvrir les produits
                    </a>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
