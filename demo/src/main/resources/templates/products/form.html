<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulaire Produit</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .error { color: red; }
        div { margin-bottom: 10px; }

    </style>
</head>
<body>
<div class="container mt-5">
<div class="row justify-content-center">
<div class="col-md-6">
<div class="card shadow-lg p-4">
<h1 class="text-center mb-4" th:text="${product.id != null} ? 'Modifier le produit' : 'Nouveau produit'"></h1>

<form th:action="${product.id != null} ? @{/products/{id}(id=${product.id})} : @{/products}"
      th:object="${product}"
      method="post">
    <div class="mb-3">
        <label class="form-label" for="name">Nom :</label>
        <input class="form-control" type="text" id="name" th:field="*{name}" required />
        <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="error"></span>
    </div>
    <div class="mb-3">
        <label class="form-label" for="description">Description :</label>
        <input class="form-control" type="text" id="description" th:field="*{description}" />
    </div>
    <div claas="mb-3">
        <label class="form-label" for="price">Prix :</label>
        <input class="form-control" type="number" id="price" th:field="*{price}" step="0.01" required />
        <span th:if="${#fields.hasErrors('price')}" th:errors="*{price}" class="error"></span>
    </div>
    <div class="mb-3">
        <label class="form-label" for="stock">Stock :</label>
        <input class="form-control" type="number" id="stock" th:field="*{stock}" required />
    </div>
    
    <button type="submit" class="btn btn-success">Enregistrer</button>
    <a th:href="@{/products}" class="btn btn-secondary w-100 mt-2">Annuler</a>
</form>
</div>
</div>
</div>
</div>
</body>
</html>
