<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Détail du produit</title>
</head>
<body>
<h1>Détail du produit</h1>
<p><strong>ID :</strong> <span th:text="${product.id}"></span></p>
<p><strong>Nom :</strong> <span th:text="${product.name}"></span></p>
<p><strong>Description :</strong> <span th:text="${product.description}"></span></p>
<p><strong>Prix :</strong> <span th:text="${product.price} + ' €'"></span></p>
<p><strong>Stock :</strong> <span th:text="${product.stock}"></span></p>
<!-- <p><strong>Actions :</strong> <span th:text="${product.actions}"></span></p> -->
<a th:href="@{/products}">Retour à la liste</a>
</body>
</html>
