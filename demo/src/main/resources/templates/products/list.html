<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Liste des produits</title>
    <style>
        body { font-family: Arial; margin: 40px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #4CAF50; color: white; }
        .btn { padding: 8px 12px; text-decoration: none; border-radius: 4px; margin: 2px; display: inline-block; }
        .btn-add { background-color: #4CAF50; color: white; }
        .btn-view { background-color: #2196F3; color: white; }
        .btn-edit { background-color: #FF9800; color: white; }
        .btn-delete { background-color: #f44336; color: white; border: none; cursor: pointer; }
        .success { background-color: #d4edda; color: #155724; padding: 10px; margin-bottom: 20px; border-radius: 4px; }
        .error { background-color: #f8d7da; color: #721c24; padding: 10px; margin-bottom: 20px; border-radius: 4px; }
    </style>
</head>
<body>
<h1>Liste des produits</h1>

<!-- Affichage des messages flash -->
<div th:if="${success}" th:text="${success}" class="success"></div>
<div th:if="${error}" th:text="${error}" class="error"></div>

<a th:href="@{/products/new}" class="btn btn-add">Nouveau produit</a>

<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Nom</th>
            <th>Prix</th>
            <th>Stock</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="product : ${products}">
            <td th:text="${product.id}"></td>
            <td th:text="${product.name}"></td>
            <td th:text="${product.price} + ' €'"></td>
            <td th:text="${product.stock}"></td>
            <td>
                <a th:href="@{/products/{id}(id=${product.id})}" class="btn btn-view">Voir</a>
                <a th:href="@{/products/{id}/edit(id=${product.id})}" class="btn btn-edit">Modifier</a>
                <form th:action="@{/products/{id}/delete(id=${product.id})}" method="post" style="display:inline;">
                    <button type="submit" class="btn btn-delete" onclick="return confirm('Confirmer la suppression ?')">Supprimer</button>
                </form>
            </td>
        </tr>
    </tbody>
</table>

<!-- Message si liste vide -->
<div th:if="${#lists.isEmpty(products)}">
    <p>Aucun produit trouvé.</p>
</div>
</body>
</html>
